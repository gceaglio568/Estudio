<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Estudio Contable</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:#F0F2F5;color:#1A2E4A;font-size:14px}
:root{
  --navy:#1A2E4A;--accent:#E8600A;--green:#1B7A4A;--gsof:#E8F5EE;
  --yellow:#7A5800;--ysof:#FFF6DC;--red:#B52A1C;--rsof:#FDECEA;
  --muted:#6B7A8D;--border:#DDE2EA;--surf:#FFF;--bg:#F0F2F5
}
#wrap{display:flex;height:100vh;overflow:hidden}
#sb{width:200px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0}
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.sb-logo{padding:16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo .t{font-size:14px;font-weight:800;color:var(--accent)}
.sb-logo .s{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px}
.sb-nav{flex:1;padding:6px 0}
.nb{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;
  color:rgba(255,255,255,.55);padding:9px 14px;cursor:pointer;font-size:12px;
  font-weight:500;text-align:left;border-left:3px solid transparent;transition:all .12s}
.nb:hover{background:rgba(255,255,255,.08);color:#fff}
.nb.on{background:rgba(255,255,255,.13);color:#fff;font-weight:700;border-left-color:var(--accent)}
.sb-foot{padding:8px 14px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;color:rgba(255,255,255,.25)}
#topbar{background:var(--surf);border-bottom:1px solid var(--border);padding:0 20px;
  height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#tb-title{font-size:15px;font-weight:700}
#content{padding:18px 20px;flex:1}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--surf);border-radius:8px;padding:13px 15px;border:1px solid var(--border)}
.kv{font-size:24px;font-weight:800;line-height:1}
.kl{font-size:11px;color:var(--muted);margin-top:3px}
.card{background:var(--surf);border-radius:8px;padding:14px 16px;border:1px solid var(--border);margin-bottom:12px}
.card-t{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.tbl{background:var(--surf);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 11px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.3px;border-bottom:1.5px solid var(--border);background:var(--bg)}
td{padding:7px 11px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#FAFBFC}
.btn{border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:opacity .12s}
.btn:hover{opacity:.85}
.ba{background:var(--accent);color:#fff}
.bn{background:var(--navy);color:#fff}
.bg{background:none;border:1.5px solid var(--border);color:var(--navy)}
.br{background:var(--red);color:#fff}
.bsm{padding:3px 8px;font-size:11px;border-radius:5px}
.bdg{display:inline-block;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700}
.sem{border-radius:5px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;border:none}
.ri{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;font-size:12px;margin-bottom:4px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.flt{display:flex;gap:7px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.flt select,.flt input{padding:5px 9px;border-radius:6px;border:1.5px solid var(--border);
  font-size:12px;color:var(--navy);background:var(--surf);outline:none}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;
  align-items:flex-start;justify-content:center;padding-top:48px;overflow-y:auto}
.ov.on{display:flex}
.modal{background:var(--surf);border-radius:10px;padding:22px 24px;width:92%;
  max-width:480px;margin-bottom:40px;box-shadow:0 16px 48px rgba(0,0,0,.2)}
.mh{font-size:14px;font-weight:700;margin-bottom:13px;display:flex;justify-content:space-between;align-items:center}
.mh .cls{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);line-height:1}
.fld{margin-bottom:11px}
.fld label{display:block;font-size:11px;font-weight:600;margin-bottom:3px;color:var(--navy)}
.fld input,.fld select,.fld textarea{width:100%;padding:7px 10px;border-radius:6px;
  border:1.5px solid var(--border);font-size:13px;color:var(--navy);background:var(--surf);
  outline:none;font-family:inherit}
.fld textarea{min-height:65px;resize:vertical}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--accent)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
.al{border-radius:8px;padding:11px 14px;margin-bottom:10px}
.al-r{background:var(--rsof);border:1px solid #E8897F33}
.al-r .ah{color:var(--red);font-size:12px;font-weight:700;margin-bottom:6px}
.al-g{background:var(--gsof);border:1px solid #9FD4B5}
.trow{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;flex-wrap:wrap;gap:7px}
.trow h2{font-size:15px;font-weight:700;margin:0}
.empty{text-align:center;padding:36px 0;color:var(--muted);font-size:13px}
.cl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.cl-card{background:var(--surf);border-radius:8px;padding:13px 14px;border:1px solid var(--border)}
.exp-card{background:var(--surf);border-radius:8px;padding:12px 14px;border:1px solid var(--border);
  margin-bottom:8px;border-left:4px solid transparent}
.exp-card.urg{border-left-color:var(--red)}
.exp-card.act{border-left-color:var(--accent)}
.exp-card.res{border-left-color:var(--green);opacity:.6}
.lib-card{background:var(--surf);border-radius:8px;padding:13px 15px;border:1px solid var(--border);margin-bottom:9px}
.lrow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.lrow:last-child{border-bottom:none}
.llbl{color:var(--muted);min-width:160px;font-size:11px}
.imp-chk{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px}
.irow{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:5px;
  border:1px solid var(--border);cursor:pointer;font-size:11px;background:var(--bg)}
.sb-sync{padding:8px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:5px}
.btn-sync{display:block;width:100%;padding:7px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:rgba(255,255,255,.75);font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .12s}
.btn-sync:hover{background:rgba(255,255,255,.15);color:#fff}
.btn-sync-imp{cursor:pointer}
</style>
</head>
<body>
<div id="wrap">
<div id="sb">
  <div class="sb-logo"><div class="t">ESTUDIO</div><div class="s">Panel de gestión</div></div>
  <nav class="sb-nav">
    <button class="nb on" onclick="go('dash',this)">📊 Resumen</button>
    <button class="nb" onclick="go('venc',this)">📅 Vencimientos</button>
    <button class="nb" onclick="go('gen',this)">⚡ Generar mes</button>
    <button class="nb" onclick="go('seg',this)">🔎 Seguimiento</button>
    <button class="nb" onclick="go('lib',this)">📚 Libros soc.</button>
    <button class="nb" onclick="go('hon',this)">💰 Honorarios</button>
    <button class="nb" onclick="go('cl',this)">👥 Clientes</button>
  </nav>
  <div class="sb-sync">
    <button class="btn-sync" onclick="exportarDatos()">⬇ Exportar datos</button>
    <label class="btn-sync btn-sync-imp" title="Importar datos">⬆ Importar datos<input type="file" accept=".json" style="display:none" onchange="importarDatos(event)"/></label>
  </div>
  <div class="sb-foot">IVA 18-22 · ARBA RN6/26 · CM RG20/25</div>
</div>
<div id="main">
  <div id="topbar"><div id="tb-title">Resumen</div><div id="tb-btn"></div></div>
  <div id="content"></div>
</div>
</div>

<!-- MODALES -->
<div class="ov" id="ov-obl" onclick="if(event.target===this)cm('ov-obl')">
<div class="modal">
  <div class="mh"><span>Obligación</span><button class="cls" onclick="cm('ov-obl')">×</button></div>
  <div class="fld"><label>Cliente</label><select id="ob-cl"></select></div>
  <div class="fld"><label>Impuesto</label><select id="ob-imp" onchange="obToggle()"></select></div>
  <div id="ob-men"><div class="r2">

    <div class="fld"><label>Año</label><select id="ob-anio"></select></div>
  </div></div>
  <div id="ob-anu" style="display:none"><div class="fld"><label>Año fiscal</label><select id="ob-anio2"></select></div></div>
  <div class="mbtns"><button class="btn bg" onclick="cm('ov-obl')">Cancelar</button><button class="btn ba" onclick="saveObl()">Guardar</button></div>
</div></div>

<div class="ov" id="ov-cl" onclick="if(event.target===this)cm('ov-cl')">
<div class="modal">
  <div class="mh"><span id="cl-t">Cliente</span><button class="cls" onclick="cm('ov-cl')">×</button></div>
  <div class="fld"><label>Nombre</label><input id="cl-nom"/></div>
  <div class="r2">
    <div class="fld"><label>CUIT personal</label><input id="cl-cuit" maxlength="11" oninput="this.value=this.value.replace(/\D/g,'')"/></div>
    <div class="fld"><label>CUIT sociedad</label><input id="cl-cuits" maxlength="11" oninput="this.value=this.value.replace(/\D/g,'')"/></div>
  </div>
  <div class="r2">
    <div class="fld"><label>Tipo</label><select id="cl-tipo">
      <option value="ph">Persona humana</option>
      <option value="soc">Sociedad</option>
      <option value="mono">Monotributista</option>
    </select></div>
    <div class="fld"><label>Mes cierre ejercicio</label><select id="cl-cie">
      <option value="">N/A</option>
      <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
      <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>

    </select></div>
  </div>
  <div class="fld"><label>Impuestos asignados</label><div class="imp-chk" id="cl-imps"></div></div>
  <div class="fld"><label>Notas</label><textarea id="cl-notas" rows="2"></textarea></div>
  <div class="mbtns"><button class="btn bg" onclick="cm('ov-cl')">Cancelar</button><button class="btn ba" onclick="saveCl()">Guardar</button></div>
</div></div>

<div class="ov" id="ov-seg" onclick="if(event.target===this)cm('ov-seg')">
<div class="modal">
  <div class="mh"><span id="seg-t">Expediente</span><button class="cls" onclick="cm('ov-seg')">×</button></div>
  <div class="fld"><label>Cliente</label><select id="sg-cl"></select></div>
  <div class="r2">
    <div class="fld"><label>Tipo</label><select id="sg-tp">
      <option value="inspeccion">Inspección</option><option value="plan_pago">Plan de pagos</option>
      <option value="embargo">Embargo</option><option value="presentacion">Presentación especial</option>
      <option value="deuda">Deuda/Intimación</option><option value="otro">Otro</option>
    </select></div>
    <div class="fld"><label>Prioridad</label><select id="sg-pr">
      <option value="urgente">🔴 Urgente</option>
      <option value="activo" selected>🟠 Activo</option>
      <option value="normal">🟡 Normal</option>

  </div>
  <div class="fld"><label>Descripción / próximos pasos</label><textarea id="sg-de"></textarea></div>

    <div class="fld"><label>Responsable</label><input id="sg-re"/></div>
  </div>
  <div class="mbtns"><button class="btn bg" onclick="cm('ov-seg')">Cancelar</button><button class="btn ba" onclick="saveSeg()">Guardar</button></div>
</div></div>

<div class="ov" id="ov-lib" onclick="if(event.target===this)cm('ov-lib')">

  <div class="fld"><label>IGJ / DPPJ</label><select id="lb-igj-e"><option value="al_dia">✅ Al día</option><option value="pendiente">⚠️ Pendiente</option><option value="vencido">🔴 Vencida</option><option value="na">N/A</option></select></div>
  <div class="fld"><label>Observaciones</label><textarea id="lb-obs" rows="2"></textarea></div>
  <div class="mbtns"><button class="btn bg" onclick="cm('ov-lib')">Cancelar</button><button class="btn ba" onclick="saveLib()">Guardar</button></div>
</div></div>

<div class="ov" id="ov-hcfg" onclick="if(event.target===this)cm('ov-hcfg')">
<div class="modal">
  <div class="mh"><span>Configurar honorario</span><button class="cls" onclick="cm('ov-hcfg')">×</button></div>
  <div class="fld"><label>Cliente</label><select id="hc-cl"></select></div>
  <div class="r2">
    <div class="fld"><label>Honorario mensual ($)</label><input type="number" id="hc-monto"/></div>
    <div class="fld"><label>Día habitual de pago</label><input type="number" id="hc-dia" min="1" max="31"/></div>
  </div>
  <div class="fld"><label>Forma de pago habitual</label><select id="hc-forma">
    <option value="transferencia">Transferencia</option><option value="efectivo">Efectivo</option>

  </select></div>
  <div class="fld"><label>Observaciones</label><input id="hc-obs"/></div>
  <div class="mbtns"><button class="btn bg" onclick="cm('ov-hcfg')">Cancelar</button><button class="btn ba" onclick="saveHonCfg()">Guardar</button></div>
</div></div>

<div class="ov" id="ov-pago" onclick="if(event.target===this)cm('ov-pago')">
<div class="modal">
  <div class="mh"><span id="pg-t">Registrar pago</span><button class="cls" onclick="cm('ov-pago')">×</button></div>
  <input type="hidden" id="pg-clid"/>
  <div class="r2">
    <div class="fld"><label>Mes</label><select id="pg-mes"></select></div>
    <div class="fld"><label>Año</label><select id="pg-anio"></select></div>
  </div>
  <div class="r2">
    <div class="fld"><label>Monto cobrado ($)</label><input type="number" id="pg-monto"/></div>

  </div>
  <div class="fld"><label>Forma de pago</label><select id="pg-forma">
    <option value="transferencia">Transferencia</option><option value="efectivo">Efectivo</option>
    <option value="cheque">Cheque</option><option value="debito">Débito automático</option><option value="otro">Otro</option>

  <div class="fld"><label>Nota / referencia</label><input id="pg-nota"/></div>
  <div class="mbtns"><button class="btn bg" onclick="cm('ov-pago')">Cancelar</button><button class="btn ba" onclick="savePago()">Registrar</button></div>
</div></div>

// ─── FECHAS ───────────────────────────────────────────────────────────────
function vencIVA(mes, term) {
  const t = parseInt(term) || 0;
  const nx = mes===11 ? 0 : mes+1;
  const na = mes===11 ? HOY.getFullYear()+1 : HOY.getFullYear();
  return new Date(na, nx, IVA_D[t] || 18);
}
function vencARBA(mes, term) {
  const t = parseInt(term) || 0;
  const grp = t<=1?0 : t<=3?1 : t<=5?2 : t<=7?3 : 4;
  const row = ARBA[mes]; if (!row) return null;
  return new Date(row[grp][2], row[grp][1], row[grp][0]);
}
function vencCM(mes, term) {
  const t = parseInt(term) || 0;
  const grp = t<=2?0 : t<=5?1 : t<=7?2 : 3;
  const row = CM[mes]; if (!row) return null;
  return new Date(row[grp][2], row[grp][1], row[grp][0]);
}
function vencMono(mes, anio) {
  const fixes = {5:22, 8:21, 11:21};
  return new Date(anio, mes, fixes[mes] || 20);
}
function vencTHYS(mes, anio) {
  return new Date(mes===11?anio+1:anio, mes===11?0:mes+1, 10);
}
function vencSoc(impId, cierreM, anioFiscal) {
  if (!cierreM) return null;
  const cm = parseInt(cierreM) - 1;
  const cierre = new Date(anioFiscal, cm, 28);
  if (impId==="gsoc") { const v=new Date(cierre); v.setMonth(v.getMonth()+5); v.setDate(v.getDate()+15); return v; }
  if (impId==="bal")  { const v=new Date(cierre); v.setMonth(v.getMonth()+4); return v; }
  if (impId==="psoc") { const v=new Date(cierre); v.setMonth(v.getMonth()+7); return v; }
  return null;
}

function calcFecha(o, cl) {
  const term = (cl && cl.cuit ? cl.cuit : "0").slice(-1);
  switch(o.impId) {
    case "iva":  return vencIVA(o.mes, term);
    case "iibb": return vencARBA(o.mes, term);
    case "cm":   return vencCM(o.mes, term);
    case "mono": return vencMono(o.mes, o.anio);
    case "thys": return vencTHYS(o.mes, o.anio);
    case "gaph": case "bp": return new Date(2026,6,27);
    case "gsoc": case "bal": case "psoc":
      return cl && cl.cierreM ? vencSoc(o.impId, cl.cierreM, o.anio)
        : (o.impId==="gsoc"?new Date(2026,7,15):o.impId==="bal"?new Date(2026,7,31):new Date(2026,6,27));
    case "lrub": return new Date(2026,11,31);
    default: return null;
  }
}

function diasHasta(f) { return f ? Math.ceil((f-HOY)/86400000) : null; }

function semColor(d, est) {
  if (est==="presentado"||est==="pagado") return {c:"var(--green)",b:"var(--gsof)",l:est==="pagado"?"✓ Pagado":"✓ Presentado"};
  if (d===null) return {c:"var(--muted)",b:"var(--bg)",l:"—"};
  if (d<0)  return {c:"var(--red)",  b:"var(--rsof)",l:"Vencida"};
  if (d<=5) return {c:"var(--red)",  b:"var(--rsof)",l:d+"d"};
  if (d<=15)return {c:"var(--yellow)",b:"var(--ysof)",l:d+"d"};
  return {c:"var(--green)",b:"var(--gsof)",l:d+"d"};
}

function oblRich(o) {
  const cl  = clientes.find(c=>c.id===o.clId) || {};
  const imp = IMPS.find(i=>i.id===o.impId) || {lbl:o.impId, col:"#888"};
  const f   = calcFecha(o, cl);
  const d   = diasHasta(f);
  return {...o, f, d, sem:semColor(d,o.est), clNom:cl.nombre||"—", clCuit:cl.cuit||"",
          impLbl:imp.lbl, impCol:imp.col, impTipo:imp.tipo};
}

// ─── HONORARIOS HELPERS ───────────────────────────────────────────────────
function fmtM(n) { return n!==null&&n!==undefined ? "$"+Math.round(n).toLocaleString("es-AR") : "—"; }
function getHcfg(clId) { return honCfg.find(h=>h.clId===clId) || null; }
function montoPagadoMes(clId,mes,anio) {
  return pagos.filter(p=>p.clId===clId&&p.mes===mes&&p.anio===anio).reduce((s,p)=>s+(+p.monto||0),0);
}
function deudaCliente(clId) {
  const h = getHcfg(clId); if (!h||!h.monto) return 0;
  let deuda = 0;
  for (let i=11; i>=0; i--) {
    const d = new Date(HOY.getFullYear(), HOY.getMonth()-i, 1);
    const pagado = montoPagadoMes(clId, d.getMonth(), d.getFullYear());
    if (pagado < +h.monto) deuda += +h.monto - pagado;
  }
  return deuda;
}
function deudaTotal() { return clientes.reduce((s,c)=>s+deudaCliente(c.id),0); }
function estHon(clId) {
  const h = getHcfg(clId); if (!h||!h.monto) return {c:"var(--muted)",b:"var(--bg)",l:"Sin config"};
  const d = deudaCliente(clId);
  if (d<=0) return {c:"var(--green)",b:"var(--gsof)",l:"Al día"};
  if (d<=+h.monto) return {c:"var(--yellow)",b:"var(--ysof)",l:"1 mes"};
  return {c:"var(--red)",b:"var(--rsof)",l:Math.ceil(d/+h.monto)+"m deuda"};
}

function doGenMes() {
  GM = +document.getElementById("gm-m").value;
  GA = +document.getElementById("gm-a").value;
  const sel = IMPS.filter(i=>i.tipo==="m" && document.getElementById("gchk-"+i.id)?.checked).map(i=>i.id);
  if (!sel.length) { document.getElementById("gen-msg").innerHTML=`<div class="al al-r"><div class="ah">Seleccioná al menos un impuesto.</div></div>`; return; }
  let cr=0, sk=0;
  clientes.forEach(cl => {
    sel.forEach(impId => {
      if (!cl.impIds || !cl.impIds.includes(impId)) return;
      if (obligaciones.some(o=>o.clId===cl.id&&o.impId===impId&&o.mes===GM&&o.anio===GA)) { sk++; return; }
      obligaciones.push({id:Date.now().toString()+Math.random().toString(36).slice(2), clId:cl.id, impId, mes:GM, anio:GA, est:"pendiente"});
      cr++;
    });
  });
  saveAll();
  document.getElementById("gen-msg").innerHTML=`<div class="al al-g"><strong style="color:var(--green)">✓ Listo.</strong> Se crearon <strong>${cr}</strong> obligaciones para ${MESES[GM]} ${GA}. ${sk?`<span style="color:var(--muted)">(${sk} ya existían)</span>`:""}</div>`;
}

function doGenAnu() {
  const anio = +document.getElementById("ga-a").value;

  clientes.forEach(cl => {

      if (obligaciones.some(o=>o.clId===cl.id&&o.impId===impId&&o.anio===anio)) { sk++; return; }
      obligaciones.push({id:Date.now().toString()+Math.random().toString(36).slice(2), clId:cl.id, impId, mes:0, anio, est:"pendiente"});
      cr++;
    });
  });
  saveAll();
  document.getElementById("gen-msg2").innerHTML=`<div class="al al-g"><strong style="color:var(--green)">✓ Listo.</strong> Se crearon <strong>${cr}</strong> obligaciones anuales ${anio}. ${sk?`<span style="color:var(--muted)">(${sk} ya existían)</span>`:""}</div>`;
}

let HTAB="res", HCLD=null;
function rHon(c) {
  document.getElementById("tb-btn").innerHTML=`<button class="btn ba bsm" onclick="openHcfg(null)">+ Configurar</button>`;
  const now=HOY, mes=now.getMonth(), anio=now.getFullYear();
  const mesA=mes===0?11:mes-1, anioA=mes===0?anio-1:anio;

  c.innerHTML=`
  <div style="display:flex;gap:2px;background:var(--bg);border-radius:7px;padding:3px;margin-bottom:14px;width:fit-content">
    <button onclick="HTAB='res';render()" style="background:${HTAB==="res"?"var(--surf)":"none"};border:none;padding:5px 13px;border-radius:5px;font-size:12px;font-weight:${HTAB==="res"?700:500};cursor:pointer;color:var(--navy)">Resumen</button>
    <button onclick="HTAB='det';render()" style="background:${HTAB==="det"?"var(--surf)":"none"};border:none;padding:5px 13px;border-radius:5px;font-size:12px;font-weight:${HTAB==="det"?700:500};cursor:pointer;color:var(--navy)">Por cliente</button>
  </div>
  <div id="hon-body"></div>`;

  if (HTAB==="res") {
    const totF = clientes.reduce((s,cl)=>{const h=getHcfg(cl.id);return s+(h?+h.monto:0);},0);
    const cobM = clientes.reduce((s,cl)=>s+montoPagadoMes(cl.id,mes,anio),0);
    const cobA = clientes.reduce((s,cl)=>s+montoPagadoMes(cl.id,mesA,anioA),0);
    const dt   = deudaTotal();
    const conD = clientes.map(cl=>({cl,d:deudaCliente(cl.id),h:getHcfg(cl.id)})).filter(x=>x.d>0).sort((a,b)=>b.d-a.d);
    const conf = clientes.filter(cl=>getHcfg(cl.id)?.monto);

    document.getElementById("hon-body").innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="kv" style="color:var(--navy)">${fmtM(totF)}</div><div class="kl">A facturar este mes</div></div>
      <div class="kpi"><div class="kv" style="color:var(--green)">${fmtM(cobM)}</div><div class="kl">Cobrado ${MESES[mes].slice(0,3)}</div></div>
      <div class="kpi"><div class="kv" style="color:var(--accent)">${fmtM(cobA)}</div><div class="kl">Cobrado ${MESES[mesA].slice(0,3)}</div></div>
      <div class="kpi"><div class="kv" style="color:var(--red)">${fmtM(dt)}</div><div class="kl">Deuda total</div></div>
    </div>
    ${conD.length?`<div class="card"><div class="card-t">🔴 Deudores</div>
    <div class="tbl"><table><thead><tr><th>Cliente</th><th>Honorario</th><th>Deuda</th><th>Últ. pago</th><th>Estado</th><th></th></tr></thead>
    <tbody>${conD.map(({cl,d,h})=>{
      const up=pagos.filter(p=>p.clId===cl.id).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha))[0];
      const es=estHon(cl.id);
      return`<tr>
        <td><strong>${cl.nombre}</strong></td>
        <td>${fmtM(h?.monto)}/mes</td>
        <td style="color:var(--red);font-weight:700">${fmtM(d)}</td>
        <td style="font-size:11px;color:var(--muted)">${up?new Date(up.fecha).toLocaleDateString("es-AR"):"—"}</td>
        <td><span class="bdg" style="background:${es.b};color:${es.c}">${es.l}</span></td>
        <td><button class="btn ba bsm" onclick="openPago('${cl.id}')">Cobrar</button></td>
      </tr>`;}).join("")}</tbody></table></div></div>`:""}
    <div class="card"><div class="card-t">Todos los clientes — ${MESES[mes]}</div>
    <div class="tbl"><table><thead><tr><th>Cliente</th><th>Honorario</th><th>Forma pago</th><th>Cobrado</th><th>Estado</th><th></th></tr></thead>
    <tbody>${conf.sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(cl=>{
      const h=getHcfg(cl.id);
      const cob=montoPagadoMes(cl.id,mes,anio);
      const es=estHon(cl.id);
      const FP={transferencia:"Transf.",efectivo:"Efectivo",cheque:"Cheque",debito:"Débito",otro:"Otro"};
      return`<tr>
        <td><strong>${cl.nombre}</strong></td>
        <td>${fmtM(h.monto)}</td>
        <td style="color:var(--muted);font-size:11px">${FP[h.forma]||"—"}</td>
        <td style="font-weight:${cob>0?700:400};color:${cob>0?"var(--green)":"var(--muted)"}">${cob>0?fmtM(cob):"—"}</td>
        <td><span class="bdg" style="background:${es.b};color:${es.c}">${es.l}</span></td>
        <td style="display:flex;gap:4px">
          <button class="btn ba bsm" onclick="openPago('${cl.id}')">Cobrar</button>
          <button class="btn bg bsm" onclick="openHcfg('${cl.id}')">⚙</button>
        </td>
      </tr>`;}).join("")}</tbody></table></div></div>
    ${clientes.filter(cl=>!getHcfg(cl.id)?.monto).length?`<div style="background:var(--bg);border-radius:7px;padding:10px 12px;font-size:11px;color:var(--muted)"><strong>${clientes.filter(cl=>!getHcfg(cl.id)?.monto).length} sin configurar:</strong> ${clientes.filter(cl=>!getHcfg(cl.id)?.monto).map(c=>c.nombre).join(", ")}</div>`:""}`;
  } else {
    const clId = HCLD || (clientes.find(cl=>getHcfg(cl.id)?.monto)||clientes[0])?.id || "";
    if (!clId) { document.getElementById("hon-body").innerHTML=`<div class="empty">Sin clientes.</div>`; return; }
    const cl=clientes.find(c=>c.id===clId)||{};
    const h=getHcfg(clId)||{};
    const meses12=[]; for(let i=11;i>=0;i--){const d=new Date(HOY.getFullYear(),HOY.getMonth()-i,1);meses12.push({mes:d.getMonth(),anio:d.getFullYear()});}
    const totF2=meses12.length*(+h.monto||0);
    const totC2=meses12.reduce((s,{mes,anio})=>s+montoPagadoMes(clId,mes,anio),0);

    document.getElementById("hon-body").innerHTML=`
    <div class="flt" style="margin-bottom:12px">
      <select onchange="HCLD=this.value;render()">${clientes.map(c=>`<option value="${c.id}"${c.id===clId?" selected":""}>${c.nombre}</option>`).join("")}</select>
      <button class="btn ba bsm" onclick="openPago('${clId}')">+ Pago</button>
      <button class="btn bg bsm" onclick="openHcfg('${clId}')">⚙ Config</button>
    </div>
    <div class="kpis" style="margin-bottom:12px">
      <div class="kpi"><div class="kv" style="color:var(--navy)">${fmtM(h.monto)}</div><div class="kl">Honorario/mes</div></div>
      <div class="kpi"><div class="kv" style="color:var(--green)">${fmtM(totC2)}</div><div class="kl">Cobrado 12m</div></div>
      <div class="kpi"><div class="kv" style="color:var(--accent)">${fmtM(totF2)}</div><div class="kl">Facturado 12m</div></div>
      <div class="kpi"><div class="kv" style="color:var(--red)">${fmtM(deudaCliente(clId))}</div><div class="kl">Deuda</div></div>
    </div>
    <div class="tbl"><table><thead><tr><th>Período</th><th>Honorario</th><th>Cobrado</th><th>Dif.</th><th>Detalle</th><th></th></tr></thead>
    <tbody>${meses12.map(({mes,anio})=>{
      const ps=pagos.filter(p=>p.clId===clId&&p.mes===mes&&p.anio===anio);
      const cob=ps.reduce((s,p)=>s+(+p.monto||0),0);
      const hm=+h.monto||0;
      const diff=cob-hm;
      const fut=new Date(anio,mes,1)>HOY;
      return`<tr>
        <td>${MESES[mes].slice(0,3)} ${anio}</td>
        <td>${fmtM(hm)}</td>
        <td style="font-weight:${cob>0?700:400};color:${cob>=hm?"var(--green)":cob>0?"var(--yellow)":"var(--muted)"}">${cob>0?fmtM(cob):"—"}</td>
        <td style="color:${diff>=0?"var(--green)":fut&&cob===0?"var(--muted)":"var(--red)"}">${fut&&cob===0?"—":diff>=0?"+"+fmtM(diff):fmtM(diff)}</td>
        <td style="font-size:11px;color:var(--muted)">${ps.map(p=>new Date(p.fecha).toLocaleDateString("es-AR")+(p.nota?" · "+p.nota:"")).join(" / ")||"—"}</td>
        <td>${ps.map(p=>`<button onclick="delPago('${p.id}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px">×</button>`).join("")}</td>
      </tr>`;}).join("")}</tbody></table></div>`;
  }
}

function cicloEst(id){

function saveCl(){
  const nom=document.getElementById("cl-nom").value.trim(), cuit=document.getElementById("cl-cuit").value.trim();
  if(!nom||!cuit){alert("Nombre y CUIT son obligatorios");return;}

function openPago(clId){
  document.getElementById("pg-clid").value=clId;
  const sm=document.getElementById("pg-mes"); sm.innerHTML=MESES.map((m,i)=>`<option value="${i}"${i===HOY.getMonth()?" selected":""}>${m}</option>`).join("");
  const sa=document.getElementById("pg-anio"); sa.innerHTML=[2024,2025,2026,2027].map(y=>`<option${y===HOY.getFullYear()?" selected":""}>${y}</option>`).join("");

}

// ─── EXPORTAR / IMPORTAR ──────────────────────────────────────────────────
function exportarDatos() {
  const datos = {
    version: 1,
    fecha: new Date().toISOString(),
    clientes, obligaciones, seguimientos, libros, honCfg, pagos
  };
  const blob = new Blob([JSON.stringify(datos, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = `estudio_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importarDatos(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const datos = JSON.parse(ev.target.result);
      if (!datos.obligaciones) { alert("Archivo inválido"); return; }
      if (!confirm("¿Reemplazar todos los datos actuales con los del archivo?")) return;
      clientes     = datos.clientes     || clientes;
      obligaciones = datos.obligaciones || [];
      seguimientos = datos.seguimientos || [];
      libros       = datos.libros       || [];
      honCfg       = datos.honCfg       || [];
      pagos        = datos.pagos        || [];
      saveAll();
      render();
      alert("✅ Datos importados correctamente");
    } catch { alert("Error al leer el archivo"); }
  };
  reader.readAsText(file);
  e.target.value = "";
}
